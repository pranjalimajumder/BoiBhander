        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .controls {
            padding: 30px;
            background: linear-gradient(135deg, #c084fc, #d8b4fe);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .search-container {
            position: relative;
            flex: 1;
            min-width: 300px;
        }

        .search-box {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #8b5cf6;
            font-size: 18px;
        }

        .filter-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.9);
            color: #6d28d9;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .filter-btn:hover, .filter-btn.active {
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);
        }

        .stats {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 30px;
            text-align: center;
            font-weight: 600;
            color: #6d28d9;
        }

        .table-container {
            overflow-x: auto;
            max-height: 70vh;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            color: white;
            padding: 20px;
            text-align: left;
            font-weight: 600;
            font-size: 16px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 15px 20px;
            border-bottom: 1px solid #e5e7eb;
            transition: background 0.3s ease;
        }

        tr {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        tr:hover {
            background: linear-gradient(90deg, #f3e8ff, #e9d5ff);
            transform: scale(1.01);
        }

        tr:nth-child(even) {
            background: #f8fafc;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
            font-size: 1.2em;
        }

        .book-no {

        }

        .title {

            color: #4f46e5;
        }

        .author {

            font-style: italic;
        }

        .genre {
            font-weight: 600;

            border-radius: 20px;
            background: linear-gradient(135deg, #c084fc, #d8b4fe);
            color: #5b21b6;
            font-size: 14px;
        }

            .controls {

                align-items: stretch;
            }
            
            .header h1 {

        }

}

}

let currentBooks=[...books];
let currentGenre="all";

const searchInput=document.getElementById("searchInput");
const micBtn=document.createElement("button");

micBtn.innerText="🎤";

searchInput.after(micBtn);
const booksBody=document.getElementById("booksBody");
const filterBtns=document.querySelectorAll(".filter-btn");
const totalBooksSpan=document.getElementById("totalBooks");
const activeFilterSpan=document.getElementById("activeFilter");
const sortSelect=document.getElementById("sortSelect");

const downloadBtn=document.getElementById("downloadPDF");
const keywordMap={
ghost:"ভৌতিক",
horror:"ভৌতিক",
detective:"গোয়েন্দা",
mystery:"রহস্য",
novel:"উপন্যাস",
poetry:"কবিতা",
music:"সঙ্গীত",
feluda:"ফেলুদা"
};

function sortBooks(list){

const type=sortSelect.value;

if(type==="az"){
list.sort((a,b)=>a.title.localeCompare(b.title));
}

else if(type==="za"){
list.sort((a,b)=>b.title.localeCompare(a.title));
}

else{
list.sort((a,b)=>a.no-b.no);
}

renderBooks(list);

}

function renderBooks(list=currentBooks){

booksBody.innerHTML="";

if(list.length===0){
booksBody.innerHTML='<tr><td colspan="4">কোনো বই পাওয়া যায়নি</td></tr>';
totalBooksSpan.textContent=0;
return;
}

list.forEach(book=>{

const row=document.createElement("tr");

row.innerHTML=`
<td>${book.no}</td>
<td>${book.title}</td>
<td>${book.author||"অজানা"}</td>
<td>${book.genre}</td>
`;

booksBody.appendChild(row);

});

totalBooksSpan.textContent=list.length;

}

function filterBooks(){

let searchTerm=searchInput.value.toLowerCase().trim();

if(keywordMap[searchTerm]){
searchTerm=keywordMap[searchTerm];
}

currentBooks=books.filter(book=>{

const title=book.title.toLowerCase();
const author=(book.author||"").toLowerCase();
const genre=book.genre.toLowerCase();
const number=book.no.toString();

const matchesSearch=
!searchTerm||
title.includes(searchTerm)||
author.includes(searchTerm)||
genre.includes(searchTerm)||
number.includes(searchTerm);

const matchesGenre=
currentGenre==="all"||
book.genre===currentGenre;

return matchesSearch&&matchesGenre;

});

sortBooks(currentBooks);

}

searchInput.addEventListener("input",filterBooks);

sortSelect.addEventListener("change",()=>{

sortBooks(currentBooks);

});

filterBtns.forEach(btn=>{

btn.addEventListener("click",()=>{

filterBtns.forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

currentGenre=btn.dataset.genre;

activeFilterSpan.textContent=btn.textContent;

filterBooks();

});

});

const speech=new webkitSpeechRecognition();

speech.lang="bn-IN";

micBtn.onclick=()=>{

speech.start();

};

speech.onresult=(event)=>{

searchInput.value=event.results[0][0].transcript;

filterBooks();

};



renderBooks();
downloadBtn.addEventListener("click",()=>{

let text="Bengali Book Library\n\n";

books.forEach(b=>{
text+=b.no+" - "+b.title+" - "+b.author+" - "+b.genre+"\n";
});

const blob=new Blob([text],{type:"text/plain"});

const link=document.createElement("a");

link.href=URL.createObjectURL(blob);

link.download="books.txt";

link.click();

});
</script>
